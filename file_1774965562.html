<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>test</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  width: 95%;
  max-width: 380px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 20px;
  color: white;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.banner-img {
  width: 100%;
  border-radius: 15px;
  margin-bottom: 15px;
}

.title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 10px;
}

.section {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 10px;
  margin: 8px 0;
}

.footer img {
  width: 100%;
  margin-top: 15px;
  border-radius: 10px;
}

.help {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #00ff88;
  color: black;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(0,0,0,0.7);
}

.panel {
  position: fixed;
  right: -100%;
  top: 0;
  width: 300px;
  height: 100%;
  background: #111;
  color: white;
  padding: 20px;
  transition: 0.3s;
}

.panel.active {
  right: 0;
}

.close-btn {
  background: red;
  padding: 5px 10px;
  border-radius: 5px;
  cursor: pointer;
  display: inline-block;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="card">
  
  <div class="title">test</div>

  <div class="section">12345678</div>
  <div class="section">banco de israel, israel</div>
  <div class="section">usa vpn</div>

  
</div>

<div class="help" onclick="toggle()">?</div>

<div class="panel" id="panel">
  <div class="close-btn" onclick="toggle()">Cerrar ✖</div>
  <h3>Detalles</h3>
  <p>si y no viva israel</p>
</div>

<script>
function toggle(){
  document.getElementById('panel').classList.toggle('active');
}
</script>

</body>
</html>
